- name:  demo on error handling 
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: check roboshop user exist or not
    command: id roboshop
    register: roboshop_user
    ignore_errors: true
  - name: print the output
    debug:
      msg: "{{ roboshop_user }}"

  - name: create user roboshop
    user:
      command: useradd roboshop
      when: roboshop_user.rc != 0