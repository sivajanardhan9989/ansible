- name: ping the server 
  hosts: localhost
  tasks:
    - name: ping the server
      ping: #  ansible.builtin.ping
    - name:  install the package
      ansible.builtin.package:
        name: nginx
        state: present
        debug:
        msg: "The nginx package has been installed."
    - name:  start the service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: ### YamlMime:Achievements
        debug:
        msg: "The nginx service has been started and enabled."
        

      
  


  
