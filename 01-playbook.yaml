- name: ping the server 
  hosts: localhost
  tasks:
    - name: ping the server 
      ping: # ansible.builtin.ping
    - name:  install nginx 
      ansible.builtin.package:
        name: nginx
        state: present
    - name: start nginx service 
      ansible.builtin.service:
        name: nginx
        state: started 
        enabled: yes
          

  
