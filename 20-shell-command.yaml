- name: demo on shell vs command 
  hosts: local
  connection: local
  tasks:
  - name: command test
    # command: cat /etc/passwd | grep root
    shell: cat /etc/passwd | grep root
    register: users_output
  - name: print the output
    debug:
      msg: "{{ users_output }}"  

  - name: list the files in /tmp directory
    shell: ls -l /tmp
    register: tmp_output    
  - name: print the tmp output
    debug:
      msg: "{{ tmp_output }}"  
