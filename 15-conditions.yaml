- name : conditions using ansible facts 
  hosts: localhost
  connection: local
  tasks:
  - name: print if redhat 
    debug:
      msg: "The given system is redhat"
    when: ansible_facts.os_family == "RedHat"
  - name: print if ubuntu 
    debug:
      msg: "The given system is ubuntu"
    when: ansible_facts.os_family == "Debian"  
