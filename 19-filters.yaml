- name: demo on filters
  hosts: local 
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagMap:
      name: Ansible
      project: roboshop
      environment: dev


  tasks:
  - name: show topics
    debug:  
      msg:  topics are {{ topics | split(",")}} 
  - name: show tagmap
    debug:    
      msg:  tagmap is {{ tagMap | dict2items }}