- name: demo on filters
  hosts: local 
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagMap:
      name: Ansible
      project: roboshop
      environment: dev
    full_name: Siva Janardhan Reddy
    ip_address: 178.90.78.17

    taglist: [
       {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "environment",
            "value": "dev"
        }

    ]


  tasks:
  - name: convert map to list
    debug:  
      msg:  topics are {{ topics | split(",")}} 
  - name: convert list to map
    debug:    
      msg:  tagmap is {{ tagMap | dict2items }}

  - name: convert list to dict
    debug:    
      msg:  taglist is {{ taglist | items2dict }}   

  - name: convert to uppercase
    debug:
      msg: "{{ full_name | upper }}"

  - name: convert to lowercase
    debug:
      msg: "{{ full_name | lower }}"

  - name: check ipv4 address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4 }}"    



